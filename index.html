<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast - Royal Edition</title>
    <style>
        body {
            background-color: #4169E1; /* Royal Blue */
            background: linear-gradient(135deg, #0B1D3A 0%, #4169E1 100%); /* Sexy Royal Dark Blue Gradient */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #score-board {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        canvas {
            background-color: #102A45;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        #piece-container {
            display: flex;
            justify-content: space-around;
            width: 400px;
            margin-top: 20px;
            height: 120px;
        }

        .piece-canvas {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: grab;
        }

        .piece-canvas:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

    <h1>Block Blast</h1>
    <div id="score-board">Score: <span id="score">0</span></div>

    <div id="game-container">
        <canvas id="gridCanvas" width="400" height="400"></canvas>
        
        <div id="piece-container">
            <canvas id="piece0" class="piece-canvas" width="100" height="100"></canvas>
            <canvas id="piece1" class="piece-canvas" width="100" height="100"></canvas>
            <canvas id="piece2" class="piece-canvas" width="100" height="100"></canvas>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
